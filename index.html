<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cordemais — Cartographie Expérientielle</title>

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    crossorigin=""
  />
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
    crossorigin=""
  ></script>

  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/xp.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/map.css" />
  <link rel="stylesheet" href="css/markers.css" />
  <link rel="stylesheet" href="css/overlay.css" />
</head>
<body>
  <svg aria-hidden="true" focusable="false" style="position:absolute;width:0;height:0;pointer-events:none;opacity:0;">
    <filter id="crt-fisheye" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.25" result="blur" />
      <feImage preserveAspectRatio="none" xlink:href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3CradialGradient id='g'%3E%3Cstop offset='0%25' stop-color='rgba(128,128,255,1)'/%3E%3Cstop offset='100%25' stop-color='rgba(0,0,0,1)'/%3E%3CradialGradient%3E%3C/defs%3E%3Crect width='100' height='100' fill='url(%23g)'/%3E%3C/svg%3E" result="map" />
      <feDisplacementMap in="SourceGraphic" in2="map" scale="5" xChannelSelector="R" yChannelSelector="G" result="distorted" />
      <feColorMatrix type="matrix" values="1.05 0 0 0 0  0 1.03 0 0 0  0 0 1.05 0 0  0 0 0 1 0" in="distorted" />
    </filter>
  </svg>

  <div id="app">
    <div id="screen-inner">
      <div id="map-wrapper">
        <header id="header">
          <div id="coord-display">
            <span id="coord-lat">47.2899° N</span><br />
            <span id="coord-lng">1.8785° W</span>
          </div>
        </header>

        <div id="map" role="application" aria-label="Carte interactive de Cordemais"></div>

        <div id="ping-count" aria-hidden="true">
          <strong id="ping-progress">1</strong>
          <span id="ping-count-label">sur <span id="ping-total">0</span> révélés</span>
        </div>
      </div>
    </div>

    <div
      id="overlay"
      role="dialog"
      aria-modal="true"
      aria-labelledby="overlay-title"
      aria-hidden="true"
    >
      <div id="overlay-backdrop"></div>
      <div id="overlay-panel" class="xp-window">
        <div class="xp-titlebar">
          <span class="xp-titlebar-icon" aria-hidden="true"></span>
          <h2 id="overlay-title" class="xp-titlebar-text">Document</h2>
          <div class="xp-titlebar-buttons">
            <button type="button" class="xp-btn xp-btn-min" tabindex="-1" aria-hidden="true" disabled>_</button>
            <button type="button" class="xp-btn xp-btn-max" tabindex="-1" aria-hidden="true" disabled>□</button>
            <button type="button" id="overlay-close" class="xp-btn xp-btn-close" aria-label="Fermer" title="Fermer">×</button>
          </div>
        </div>
        <div class="xp-menubar" aria-hidden="true">
          <span><u>F</u>ichier</span>
          <span><u>É</u>dition</span>
          <span><u>A</u>ffichage</span>
          <span>? <u>Aide</u></span>
        </div>
        <div class="xp-toolbar" aria-hidden="true">
          <span class="xp-tool" title="Précédent">◀</span>
          <span class="xp-tool" title="Suivant">▶</span>
          <span class="xp-tool-sep"></span>
          <span class="xp-tool" title="Dossier">📁</span>
          <span class="xp-tool" title="Imprimer">🖨</span>
        </div>
        <div id="overlay-body" class="xp-client">
          <fieldset class="xp-fieldset overlay-section-hidden" id="overlay-image-wrap">
            <legend>Aperçu</legend>
            <div class="xp-inset xp-image-frame">
              <img id="overlay-image" src="" alt="" />
            </div>
            <p id="overlay-image-caption" class="xp-caption"></p>
          </fieldset>
          <div id="overlay-text" class="xp-inset xp-text-panel"></div>
          <fieldset class="xp-fieldset overlay-section-hidden" id="overlay-audio-wrap">
            <legend id="overlay-audio-label">Lecteur multimédia</legend>
            <div class="xp-inset xp-audio-panel">
              <button type="button" id="audio-btn" class="xp-audio-btn" aria-label="Lecture / Pause">▶</button>
              <div id="audio-progress-wrap" class="xp-progress-wrap">
                <div
                  id="audio-progress-track"
                  class="xp-progress-track"
                  role="progressbar"
                  aria-valuenow="0"
                  aria-valuemin="0"
                  aria-valuemax="100"
                >
                  <div id="audio-progress-fill" class="xp-progress-fill"></div>
                </div>
                <span id="audio-time" class="xp-audio-time">0:00 / 0:00</span>
              </div>
            </div>
            <audio id="audio-element" preload="none"></audio>
          </fieldset>
        </div>
        <div class="xp-statusbar">
          <span class="xp-status-panel" id="overlay-coords">Prêt</span>
          <span class="xp-status-panel xp-status-grow" id="overlay-category"></span>
          <span class="xp-status-panel xp-status-fixed">CAPS</span>
        </div>
      </div>
    </div>
  </div>

  <div id="crt-effect" aria-hidden="true">
      <div id="crt-glitch" aria-hidden="true"></div>
    </div>

    <div id="frame-border" aria-hidden="true"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
